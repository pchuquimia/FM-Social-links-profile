<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <img
          class="card__image"
          src="./assets/images/avatar-jessica.jpeg"
          alt="Portrait of Jessica Randall"
        />
        <h1 class="card__name">Jessica Randall</h1>
        <p class="card__address">London, United Kingdom</p>
        <p class="card__description">"Front-end developer and avid reader."</p>

        <nav class="card__nav" aria-label="Social Links">
          <ul class="card__list">
            <li><a class="card__link" href="#">GitHub</a></li>
            <li><a class="card__link" href="#">Frontend Mentor</a></li>
            <li><a class="card__link" href="#">LinkedIn</a></li>
            <li><a class="card__link" href="#">Twitter</a></li>
            <li><a class="card__link" href="#">Instagram</a></li>
          </ul>
        </nav>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
